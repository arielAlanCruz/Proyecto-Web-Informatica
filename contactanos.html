<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - TecnoShop</title>
    <script src="./js/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="./estilos/estilos.css">
    <link rel="stylesheet" href="./estilos/formularios.css">
    <link rel="icon" type="image/x-icon" href="./img/logo2.png">
</head>

<body>
    <div id="contenedor">
        <!-- HEADER -->
        <header class="header-principal">
            <div class="logo-container">
                <a href="index.html"><img src="./img/logo.png" alt="TecnoShop Logo" width="100"></a>
            </div>
            <div class="acciones-container">
                <a href="carrito.html" class="btn-carrito-header">🛒 <span id="contador-carrito">0</span></a>
            </div>
        </header>

        <main style="padding: 20px;">
            <!-- BOTÓN VOLVER A LA TIENDA (UX/UI) -->
            <div style="max-width: 500px; margin: 20px auto 0; text-align: left;">
                <a href="index.html" style="text-decoration: none; color: #22323d; font-weight: bold; font-size: 14px;">
                    ← Volver a la Tienda
                </a>
            </div>

            <!-- FORMULARIO -->
            <div class="formulario-contenedor">
                <h2>📩 Contactanos</h2>
                <p class="descripcion">¿Tenés alguna consulta sobre nuestros productos? Dejanos tu mensaje y te
                    responderemos a la brevedad.</p>

                <div id="mensaje-feedback"></div>

                <form id="contactoForm">
                    <div class="campo">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="campo">
                        <label for="apellido">Apellido:</label>
                        <input type="text" id="apellido" name="apellido" required>
                    </div>
                    <div class="campo">
                        <label for="correo">Correo Electrónico:</label>
                        <input type="text" id="correo" name="correo" required>
                    </div>
                    <div class="campo">
                        <label for="asunto">Asunto:</label>
                        <input type="text" id="asunto" name="asunto" required>
                    </div>
                    <div class="campo">
                        <label for="descripcion">Mensaje:</label>
                        <textarea id="descripcion" name="descripcion" rows="5" required></textarea>
                    </div>

                    <div class="botones">
                        <button type="submit">Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            <p>© TecnoShop - Av Independencia 820, CABA</p>
        </footer>
    </div>

    <!-- Enlazamos App.js para el contador del carrito del header, y formularios.js para la lógica pura -->
    <script src="./js/app.js"></script>
    <script src="./js/formularios.js"></script>
</body>

</html>
